<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Miyav & Hav</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/616/616408.png">
    
    <style>
        :root { --main-lilac: #e1bee7; --dark-lilac: #7b1fa2; --soft-pink: #fce4ec; --apple-gray: #f2f2f7; --accent-red: #ff2d55; --accent-green: #34c759; }
        body { font-family: 'Poppins', sans-serif; background: var(--apple-gray); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; color: #1d1d1f; overflow: hidden; }
        .app-container { width: 100%; max-width: 414px; height: 100vh; background: #ffffff; position: relative; display: flex; flex-direction: column; overflow: hidden; }
        @media (min-width: 414px) { .app-container { height: 90vh; max-height: 850px; border-radius: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); border: 8px solid #ffffff; } }
        
        .header { padding: 25px 20px 10px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); text-align: center; border-bottom: 1px solid rgba(0,0,0,0.05); z-index: 100; flex-shrink: 0; }
        .header h2 { margin: 0; font-size: 18px; font-weight: 700; color: var(--dark-lilac); }
        .content-area { flex: 1; overflow-y: auto; padding: 20px 20px 100px; background: #fbfbfd; }
        .screen { display: none; animation: fadeIn 0.3s ease-out; }
        .active-screen { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Kedi Maskotu - Y ekseni düzeltildi */
        #petMascot { position: absolute; bottom: 150px; right: 20px; font-size: 45px; cursor: pointer; z-index: 1000; animation: kittyDance 1.5s infinite alternate ease-in-out; display: none; }
        @keyframes kittyDance { from { transform: scale(1) rotate(-5deg); } to { transform: scale(1.1) rotate(5deg); } }

        .total-pot-card { background: linear-gradient(135deg, var(--main-lilac), #f8bbd0); padding: 20px; border-radius: 25px; color: var(--dark-lilac); text-align: center; margin-bottom: 20px; box-shadow: 0 8px 15px rgba(123, 31, 162, 0.1); }
        .amount { font-size: 32px; font-weight: 800; }
        .pot-split { display: flex; justify-content: space-between; margin-top: 15px; border-top: 1px solid rgba(123, 31, 162, 0.1); padding-top: 10px; }
        .pot-item { flex: 1; }
        .pot-item div:first-child { font-size: 10px; font-weight: 700; opacity: 0.7; }
        
        .bottom-nav { position: absolute; bottom: 0; width: 100%; background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(25px); display: none; justify-content: space-around; padding: 15px 0 35px; border-top: 1px solid rgba(0,0,0,0.05); z-index: 99; }
        .nav-link { display: flex; flex-direction: column; align-items: center; color: #aaa; font-size: 10px; font-weight: 600; cursor: pointer; flex: 1; transition: 0.2s; }
        .nav-link.active { color: var(--dark-lilac); }
        .nav-link span { font-size: 22px; margin-bottom: 3px; }

        .primary-btn { width: 100%; padding: 16px; border: none; border-radius: 20px; background: var(--dark-lilac); color: white; font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .modern-input { width: 100%; box-sizing: border-box; padding: 16px; border: 2px solid #efeff4; border-radius: 18px; background: #f5f5f7; font-size: 16px; margin-bottom: 15px; font-family: inherit; }
        
        .list-item { background: white; border-radius: 20px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(0,0,0,0.02); }
        .friend-item { cursor: pointer; transition: 0.2s; }
        .friend-item:active { transform: scale(0.98); background: #fafafa; }
        .payment-btn { border: none; border-radius: 12px; padding: 8px 14px; color: white; font-size: 11px; font-weight: 700; cursor: pointer; }
        .btn-unpaid { background: var(--accent-red); } 
        .btn-paid { background: var(--accent-green); }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header"><h2>🐾 Miyav & Hav</h2></div>
        <div id="petMascot" onclick="app.switchTab('gameScreen')">🐱</div>

        <div class="content-area">
            <div id="loginScreen" class="screen active-screen">
                <div style="text-align: center; margin: 40px 0;">
                    <img src="https://cdn-icons-png.flaticon.com/512/616/616408.png" width="80" style="margin-bottom: 15px;">
                    <h3>Pati Girişi</h3>
                </div>
                <input type="text" id="loginUser" class="modern-input" placeholder="İsminiz">
                <input type="password" id="loginPin" class="modern-input" maxlength="4" placeholder="4 Haneli PIN" inputmode="numeric">
                <button class="primary-btn" onclick="app.login()">Giriş Yap</button>
            </div>

            <div id="homeScreen" class="screen">
                <div class="total-pot-card">
                    <div style="font-size: 11px; font-weight: 700; opacity: 0.8;">🚨 ÖDENMEMİŞ TOPLAM</div>
                    <div class="amount" id="totalUnpaidDisplay">₺0.00</div>
                    <div class="pot-split">
                        <div class="pot-item"><div>ÖDENEN</div><div id="totalPaidDisplay" style="color:#2e7d32; font-weight:700;">₺0.00</div></div>
                        <div class="pot-item"><div>BUGÜN</div><div id="todayPenaltyDisplay" style="font-weight:700;">₺0.00</div></div>
                    </div>
                </div>
                <div style="margin-bottom:15px; background: #e8f5e9; padding: 15px; border-radius: 18px; font-size: 12px; font-weight: 700; color: #2e7d32; display: flex; justify-content: space-between; align-items: center;">
                    <span>🦴 Ortak Mama:</span> <span id="mamaPointsDisplay" style="font-size: 16px;">58</span>
                </div>
                <input type="date" id="screenTimeDate" class="modern-input">
                <input type="number" id="screenTimeInput" class="modern-input" placeholder="Kaç dakika?">
                <button class="primary-btn" onclick="app.saveLog()">Kaydet ve Mama Kazan 🦴</button>
            </div>

            <div id="paymentsScreen" class="screen">
                <h3>💳 Borç Dağılımı</h3>
                <div id="personalDebtSummary" style="background:white; padding:15px; border-radius:20px; margin-bottom:20px; font-weight:600; border:1px solid #eee;"></div>
                <div id="paymentsListContainer"></div>
            </div>

            <div id="friendsScreen" class="screen">
                <h3>🐕 Dostlar</h3>
                <div style="display:flex; gap:8px; margin-bottom:20px;"><input type="text" id="addFriendInput" class="modern-input" style="margin:0;"><button class="primary-btn" onclick="app.addFriend()" style="width:auto; padding:15px;">Ekle</button></div>
                <div id="friendsList"></div>
            </div>

            <div id="friendProfileScreen" class="screen">
                <button class="primary-btn" onclick="app.switchTab('friendsScreen')" style="width:auto; padding:10px 20px; background:#eee; color:#333; margin-bottom:15px; border-radius: 12px; border:none;">⬅ Geri</button>
                <h3 id="fpName" style="text-align:center;">Partner</h3>
                <div class="total-pot-card" style="background:white; border:2px solid red; color:red; box-shadow:none;"><div class="label" style="color:black; font-size:12px;">Ödenmemiş Borcu</div><div class="amount" id="fpTotal">₺0.00</div></div>
                <h4>📜 Kayıt Geçmişi</h4>
                <div id="fpHistoryList"></div>
            </div>

            <div id="myProfileScreen" class="screen">
                <h3>👤 Ayarlar & Profil</h3>
                <div class="input-group">
                    <label style="font-size:12px; font-weight:600;">Günlük Limit (Dk)</label><input type="number" id="setLimit" class="modern-input">
                    <label style="font-size:12px; font-weight:600;">Ceza (1 Dk / ₺)</label><input type="number" step="0.1" id="setRate" class="modern-input">
                </div>
                <button class="primary-btn" onclick="app.updateSettings()">Ayarları Kaydet</button>
                <div style="margin-top:20px;">
                    <h4>📜 Senin Kayıtların</h4>
                    <div id="detailedLogHistory"></div>
                </div>
                <button class="primary-btn" onclick="app.logout()" style="background:#888; margin-top:30px;">Çıkış Yap</button>
            </div>

            <div id="gameScreen" class="screen">
                <button class="primary-btn" onclick="app.switchTab('homeScreen')" style="background:#eee; color:#333; margin-bottom:20px; border:none; border-radius:15px;">⬅ Geri</button>
                <div style="text-align: center; background: white; border-radius: 30px; padding: 30px 20px; border: 2px solid var(--main-lilac);">
                    <div id="petAvatar" style="font-size: 80px; margin-bottom: 20px;">🐱</div>
                    <div style="font-size: 20px; font-weight: 800;">🦴 <span id="currentMamas">58</span> Mama</div>
                    <button class="primary-btn" onclick="app.feedPet()" style="background: var(--accent-green); margin-top:20px;">Besle (-10 Puan)</button>
                </div>
            </div>
        </div>

        <nav class="bottom-nav" id="bottomNav">
            <div class="nav-link active" onclick="app.switchTab('homeScreen', this)"><span>🏠</span>Ev</div>
            <div class="nav-link" onclick="app.switchTab('paymentsScreen', this)"><span>💳</span>Finans</div>
            <div class="nav-link" onclick="app.switchTab('friendsScreen', this)"><span>🐕</span>Dostlar</div>
            <div class="nav-link" onclick="app.switchTab('myProfileScreen', this)"><span>👤</span>Profil</div>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, doc, updateDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
        const firebaseConfig = { apiKey: "AIzaSyDsBBHVbNmcbeToQ-zXjFIt68RfhYl5qds", authDomain: "miyav-yatirim.firebaseapp.com", projectId: "miyav-yatirim", storageBucket: "miyav-yatirim.firebasestorage.app", messagingSenderId: "442761859255", appId: "1:442761859255:web:794c98053f761f1df7bd32" };
        const fApp = initializeApp(firebaseConfig); const db = getFirestore(fApp);
        
        const app = {
            currentUser: null, userRef: null, currentSettings: { limit: 180, rate: 1.0 },
            async login() {
                const u = document.getElementById('loginUser').value.trim(), p = document.getElementById('loginPin').value.trim();
                if(!u || p.length !== 4) return;
                const name = u.charAt(0).toUpperCase() + u.slice(1).toLowerCase();
                const snap = await getDocs(query(collection(db, "users"), where("username", "==", name)));
                if(snap.empty) {
                    const nD = await addDoc(collection(db, "users"), { username: name, pin: p, dailyLimit: 180, penaltyRate: 1.0, friends: [], groupId: null, petMamas: 58 });
                    this.setupUser({id: nD.id, username: name, dailyLimit: 180, penaltyRate: 1.0, petMamas: 58});
                } else {
                    const uD = snap.docs[0].data();
                    if(uD.pin === p) this.setupUser({id: snap.docs[0].id, ...uD});
                    else alert("Hatalı PIN!");
                }
            },
            setupUser(data) {
                this.currentUser = data; this.userRef = doc(db, "users", data.id);
                document.getElementById('screenTimeDate').value = new Date().toISOString().split('T')[0];
                document.getElementById('bottomNav').style.display = "flex";
                document.getElementById('petMascot').style.display = "block";
                this.switchTab('homeScreen', document.querySelector('.nav-link'));
                this.init(); this.listenToSettings(); this.listenToPet();
            },
            listenToPet() {
                const tRef = this.currentUser.groupId ? doc(db, "groups", this.currentUser.groupId) : this.userRef;
                onSnapshot(tRef, (d) => {
                    if(!d.exists()) return;
                    const data = d.data();
                    const mamas = data.petMamas !== undefined ? data.petMamas : 58;
                    document.getElementById('currentMamas').innerText = mamas;
                    document.getElementById('mamaPointsDisplay').innerText = mamas;
                    this.currentMamas = mamas;
                });
            },
            async feedPet() {
                if(this.currentMamas < 10) return alert("Yetersiz mama!");
                const tRef = this.currentUser.groupId ? doc(db, "groups", this.currentUser.groupId) : this.userRef;
                await updateDoc(tRef, { petMamas: this.currentMamas - 10 });
            },
            async saveLog() {
                const dV = document.getElementById('screenTimeDate').value, mins = parseInt(document.getElementById('screenTimeInput').value);
                if(!dV || isNaN(mins)) return;
                const penalty = Math.max(0, (mins - this.currentSettings.limit) * this.currentSettings.rate);
                const tRef = this.currentUser.groupId ? doc(db, "groups", this.currentUser.groupId) : this.userRef;
                if (mins < this.currentSettings.limit) await updateDoc(tRef, { petMamas: (this.currentMamas || 0) + (this.currentSettings.limit - mins) });
                await addDoc(collection(db, "logs"), { userId: this.currentUser.id, username: this.currentUser.username, groupId: this.currentUser.groupId, minutes: mins, penalty: penalty, cleared: false, date: new Date(dV).toLocaleDateString('tr-TR', {day:'2-digit', month:'2-digit'}), timestamp: new Date(dV).getTime() });
                alert("Kaydedildi!"); document.getElementById('screenTimeInput').value = "";
            },
            switchTab(id, el) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
                document.getElementById(id).classList.add('active-screen');
                if(el) { document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active')); el.classList.add('active'); }
                document.getElementById('petMascot').style.display = (id === 'homeScreen') ? 'block' : 'none';
                if(id === 'paymentsScreen') this.loadPayments();
                if(id === 'myProfileScreen') this.loadDetailedHistory();
                if(id === 'friendsScreen') this.loadFriends();
            },
            init() {
                onSnapshot(collection(db, "logs"), (snap) => {
                    let unpaid = 0, paid = 0, today = 0, summary = {};
                    const tStr = new Date().toLocaleDateString('tr-TR', { day: '2-digit', month: '2-digit' });
                    snap.forEach(dS => {
                        const d = dS.data();
                        if (d.userId === this.currentUser.id || (this.currentUser.groupId && d.groupId === this.currentUser.groupId)) {
                            if (d.cleared) paid += d.penalty;
                            else { unpaid += d.penalty; if (d.date === tStr) today += d.penalty; summary[d.username] = (summary[d.username] || 0) + d.penalty; }
                        }
                    });
                    document.getElementById('totalUnpaidDisplay').innerText = `₺${unpaid.toFixed(2)}`;
                    document.getElementById('totalPaidDisplay').innerText = `₺${paid.toFixed(2)}`;
                    document.getElementById('todayPenaltyDisplay').innerText = `₺${today.toFixed(2)}`;
                    let sHtml = ""; for(let u in summary) sHtml += `<div>${u}: ₺${summary[u].toFixed(2)}</div>`;
                    document.getElementById('personalDebtSummary').innerHTML = sHtml || "Tertemiz! ✨";
                });
            },
            async loadDetailedHistory() {
                const histDiv = document.getElementById('detailedLogHistory');
                const q = query(collection(db, "logs"), where("userId", "==", this.currentUser.id));
                const snap = await getDocs(q); let logs = []; snap.forEach(d => { let data = d.data(); data.id = d.id; logs.push(data); });
                logs.sort((a,b) => b.timestamp - a.timestamp); histDiv.innerHTML = "";
                logs.forEach(l => { histDiv.innerHTML += `<div class="list-item"><div>${l.date}<br><small>${l.minutes} dk</small></div><div style="text-align:right;"><span style="color:${l.penalty > 0 ? 'red':'green'}">₺${l.penalty.toFixed(2)}</span><br><button onclick="app.deleteLog('${l.id}')" style="background:none; border:none; font-size:12px; color:#888;">Sil 🗑️</button></div></div>`; });
            },
            async deleteLog(id) { if(confirm("Silinsin mi?")) { await deleteDoc(doc(db, "logs", id)); this.loadDetailedHistory(); } },
            listenToSettings() {
                if(this.currentUser.groupId) {
                    onSnapshot(doc(db, "groups", this.currentUser.groupId), (d) => {
                        if(d.exists()) { const gd = d.data(); this.currentSettings = { limit: gd.dailyLimit, rate: gd.penaltyRate }; this.updateUI(); }
                    });
                } else { this.updateUI(); }
            },
            updateUI() { document.getElementById('setLimit').value = this.currentSettings.limit; document.getElementById('setRate').value = this.currentSettings.rate; },
            async loadPayments() {
                const list = document.getElementById('paymentsListContainer');
                const q = this.currentUser.groupId ? query(collection(db, "logs"), where("groupId", "==", this.currentUser.groupId)) : query(collection(db, "logs"), where("userId", "==", this.currentUser.id));
                const snap = await getDocs(q); let logs = []; snap.forEach(d => { let data = d.data(); data.id = d.id; logs.push(data); });
                logs.sort((a,b) => b.timestamp - a.timestamp); list.innerHTML = "";
                logs.forEach(d => { if(d.penalty > 0) list.innerHTML += `<div class="list-item"><div>${d.username}<br><small>${d.date}</small></div><div style="display:flex; align-items:center; gap:10px;">₺${d.penalty.toFixed(2)} <button class="payment-btn ${d.cleared ? 'btn-paid':'btn-unpaid'}" onclick="app.togglePayment('${d.id}', ${d.cleared})">${d.cleared ? 'Ödendi':'Ödenmedi'}</button></div></div>`; });
            },
            async togglePayment(id, s) { await updateDoc(doc(db, "logs", id), { cleared: !s }); this.loadPayments(); },
            async updateSettings() {
                const l = parseInt(document.getElementById('setLimit').value), r = parseFloat(document.getElementById('setRate').value);
                const tRef = this.currentUser.groupId ? doc(db, "groups", this.currentUser.groupId) : this.userRef;
                await updateDoc(tRef, { dailyLimit: l, penaltyRate: r }); alert("Güncellendi!");
            },
            async addFriend() {
                const f = document.getElementById('addFriendInput').value.trim(); if(!f) return;
                const name = f.charAt(0).toUpperCase() + f.slice(1).toLowerCase();
                const snap = await getDocs(query(collection(db, "users"), where("username", "==", name)));
                if(snap.empty) return alert("Bulunamadı.");
                const newList = [...(this.currentUser.friends || []), name];
                await updateDoc(this.userRef, { friends: newList }); this.currentUser.friends = newList; this.loadFriends();
            },
            async loadFriends() {
                const list = document.getElementById('friendsList'); if(!this.currentUser.friends?.length) { list.innerHTML = "Dost listesi boş."; return; }
                const snap = await getDocs(query(collection(db, "users"), where("username", "in", this.currentUser.friends)));
                list.innerHTML = ""; snap.forEach(d => {
                    const u = d.data(); const isConn = u.groupId && u.groupId === this.currentUser.groupId;
                    list.innerHTML += `<div class="list-item friend-item" onclick="app.handleFriendClick('${u.username}', ${isConn})"><div>${u.username} ${isConn ? '💖':''}</div><div style="color:var(--dark-lilac); font-size:12px;">${isConn ? 'Bağlı':'Tıkla'}</div></div>`;
                });
            },
            async handleFriendClick(n, c) { if(c) this.openFriendProfile(n); else { if(confirm(`${n} ile partner ol?`)) { const snap = await getDocs(query(collection(db, "users"), where("username", "==", n))); const nG = await addDoc(collection(db, "groups"), { dailyLimit: 180, penaltyRate: 1.0, petMamas: 58 }); await updateDoc(this.userRef, { groupId: nG.id }); await updateDoc(doc(db, "users", snap.docs[0].id), { groupId: nG.id }); location.reload(); } } },
            async openFriendProfile(name) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
                document.getElementById('friendProfileScreen').classList.add('active-screen');
                document.getElementById('fpName').innerText = name;
                const snap = await getDocs(query(collection(db, "logs"), where("username", "==", name)));
                let total = 0, logs = []; snap.forEach(d => { let data = d.data(); if(!data.cleared) total += data.penalty; logs.push(data); });
                document.getElementById('fpTotal').innerText = `₺${total.toFixed(2)}`;
                const list = document.getElementById('fpHistoryList'); list.innerHTML = "";
                logs.sort((a,b) => b.timestamp - a.timestamp).slice(0,10).forEach(d => { list.innerHTML += `<div class="list-item"><div>${d.minutes} Dk<br><small>${d.date}</small></div><div style="color:${d.cleared ? '#888':'red'}">₺${d.penalty.toFixed(2)}</div></div>`; });
            },
            logout() { location.reload(); }
        };
        window.app = app;
    </script>
</body>
</html>
